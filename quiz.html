<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz Personal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Poppins', sans-serif;
        text-align: center;
        background: #bae1f7;
        margin: 0;
        padding: 0;
    }

    .quiz-container {
        background: #ffffff;
        padding: 30px;
        width: 60%;
        margin: 60px auto;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        color: #1e3a5f;
    }

    button {
        margin: 8px;
        padding: 12px 20px;
        border: none;
        border-radius: 10px;
        background-color: #d6f0ff;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        color: #1e3a5f;
    }

    button:hover {
        background-color: #a8d8f0;
    }

    .correct {
        background-color: #4CAF50 !important;
        color: white;
    }

    .wrong {
        background-color: #f44336 !important;
        color: white;
    }

    #feedback {
        font-weight: bold;
        margin-top: 15px;
        font-size: 18px;
        color: #1e3a5f;
    }
</style>
</head>

<body>

<div class="quiz-container">
    <h2 id="question">Pregunta</h2>
    <div id="answers"></div>
    <h3 id="feedback"></h3>
    <button onclick="nextQuestion()">Siguiente</button>
</div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>

const quiz = [
    {q: "¿Cristy, cual es mi comida favorita?", options: ["Pizza", "Hamburguesa", "Arroz con pollo", "Cristy"], correct: 3},
    {q: "¿Cual es mi bebida favorita?", options: ["Agua", "Cerveza", "cerevita", "soda"], correct: 2},
    {q: "¿Color favorito?", options: ["Rojo", "Azul", "Verde", "Negro", "El color de piel de cristy"], correct: 4},
    {q: "¿animal favorito?", options: ["Gato", "Perro", "Koala", "Ballena"], correct: 2},
    {q: "¿Que red social uso mas?", options: ["Insta", "Tikitoki", "YouTube", "Crunchyroll"], correct: 0},
    {q: "¿Cual es mi hobby?", options: ["Jugar futbol", "Programar", "dormir", "Ver anime"], correct: 1},
    {q: "¿Que hago en mi tiempo libre", options: ["Prohgramar", "Dormir", "Tarea", "molestar a crsty"], correct: 0},
    {q: "¿Cuantos  hijos quiero tener?", options: ["2", "3", "4", "5"], correct: 1},
    {q: "¿A que pais quiero viajar?", options: ["Japon", "España", "inglaterra", "Italia"], correct: 0},
    {q: "¿Que dia cumplo años?", options: ["30 de diciembre", "30 de novienbre", "30 de septiembre", "9 de febrero"], correct: 0},
    {q: "¿Que prefiero hacer cuando estoy contigo?", options: ["besarte", "abrazarte", "molestarte", "tocarte", "Todo"], correct: 4}
];

let current = 0;
let score = 0;
let results = [];

function loadQuestion() {
    document.getElementById("feedback").textContent = "";
    const q = quiz[current];
    document.getElementById("question").textContent = q.q;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.options.forEach((opt, index) => {
        const btn = document.createElement("button");
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(index, btn);
        answersDiv.appendChild(btn);
    });
}

function checkAnswer(index, button) {
    const correctIndex = quiz[current].correct;
    const buttons = document.querySelectorAll("#answers button");

    buttons.forEach(btn => btn.disabled = true);

    if (index === correctIndex) {
        button.classList.add("correct");
        document.getElementById("feedback").textContent = "✔ Correcto wee :)";
        document.getElementById("correctSound").play();
        score++;
        results.push(true);
    } else {
        button.classList.add("wrong");
        buttons[correctIndex].classList.add("correct");
        document.getElementById("feedback").textContent = "✘ Incorrecto :(";
        document.getElementById("wrongSound").play();
        results.push(false);
    }
}

function nextQuestion() {
    current++;
    if (current < quiz.length) {
        loadQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    let porcentaje = (score / quiz.length) * 100;

    let resumen = `
        <div style="background:white; padding:30px; border-radius:15px; width:60%; margin:auto; font-family:Poppins;">
        <h2 style="color:#1e3a5f;">Resultado Final</h2>
        <p>Acertaste ${score} de ${quiz.length} (${porcentaje}%)</p>
        <h3>Detalle:</h3>
    `;

    quiz.forEach((q, i) => {
        resumen += `<p>${q.q} - ${results[i] ? "✔ Correcta" : "✘ Incorrecta"}</p>`;
    });

    resumen += "</div>";

    document.body.innerHTML = resumen;
}

loadQuestion();

</script>

</body>
</html>
